    <script>
        // 탭 기능
        const tabItems = document.querySelectorAll('.tab_260309 ul li');
        const contentItems = document.querySelectorAll('.contents_260309 ul');

        tabItems.forEach((tab, index) => {
            tab.addEventListener('click', () => {
                // 모든 탭에서 active 제거
                tabItems.forEach(item => item.classList.remove('active'));

                // 클릭한 탭에 active 추가
                tab.classList.add('active');

                // 모든 컨텐츠에 dis-no 추가
                contentItems.forEach(content => content.classList.add('dis-no'));

                // 해당하는 컨텐츠에서 dis-no 제거
                contentItems[index].classList.remove('dis-no');
            });
        });
    </script>
