    <script>
        // 스크롤 기반 탭 기능
        const tabContainer = document.querySelector('.tab_260309');
        const tabItems = document.querySelectorAll('.tab_260309 ul li');
        const contentItems = document.querySelectorAll('.contents_260309 ul');

        // 모든 컨텐츠 표시 (dis-no 제거)
        contentItems.forEach(content => content.classList.remove('dis-no'));

        // 탭 활성화 함수
        function setActiveTab(index) {
            tabItems.forEach(item => item.classList.remove('active'));
            tabItems[index].classList.add('active');
        }

        // IntersectionObserver로 스크롤에 따라 탭 활성화
        const observerOptions = {
            root: null,
            rootMargin: '-50% 0px -50% 0px',
            threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const index = Array.from(contentItems).indexOf(entry.target);
                    setActiveTab(index);
                }
            });
        }, observerOptions);

        contentItems.forEach(content => observer.observe(content));

        // 탭 클릭 시 해당 컨텐츠로 스크롤 이동
        tabItems.forEach((tab, index) => {
            tab.addEventListener('click', (e) => {
                e.preventDefault();
                contentItems[index].scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            });
        });
    </script>

    <script>
        const baseCouponLink = 'https://naosmall.kr/exec/front/newcoupon/IssueDownload?coupon_no=';
        const openRunCouponList = [
            '6084614480500001621',
            '6084614486300001622',
            '6084614487500001623',
            '6084614488400001624',
            '6084614490100001625',
            '6084614491400001626',
            '6084614492500001627',
            '6084614493600001628',
            '6084614494400001629',
            '6084614495200001630',
            '6084614496200001631',
            '6084614497500001632',
            '6084614500600001633',
            '6084614501600001634',
        ]

        // 쿠폰 날짜별 적용 (3/16 10:00부터 시작, 매일 10시 기준으로 변경)
        function setDailyCoupon() {
            const now = new Date();
            const startDate = new Date(2026, 2, 16, 10, 0, 0); // 2026년 3월 16일 10:00

            // 현재 날짜의 10시 기준 시간
            const todayBase = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 10, 0, 0);

            // 시작일부터 며칠 지났는지 계산
            let daysPassed = 0;
            if (now >= startDate) {
                const diffTime = todayBase - startDate;
                daysPassed = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                // 오늘 10시가 아직 안됐으면 전날 쿠폰 사용
                if (now.getHours() < 10) {
                    daysPassed -= 1;
                }
            }

            // 인덱스 범위 체크
            if (daysPassed < 0) daysPassed = 0;
            if (daysPassed >= openRunCouponList.length) daysPassed = openRunCouponList.length - 1;

            // href 설정
            const couponLink = document.querySelector('.event_260316 #open_run_coupon');
            const couponNo = openRunCouponList[daysPassed];
            couponLink.href = baseCouponLink + couponNo;
        }

        setDailyCoupon();


        // event_260316 토글 기능
        const toggleBtn260316 = document.querySelector('.event_260316 button[type="button"]');
        const toggleTarget260316 = document.querySelector('.toggle_target_1');

        toggleBtn260316.addEventListener('click', () => {
            toggleTarget260316.classList.toggle('dis-no');
        });
    </script>
